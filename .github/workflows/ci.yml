name: CI Pipeline — Ψηφιακή Κάρτα Εργασίας

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests & Lint
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout κώδικα
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Εγκατάσταση dependencies
        run: npm ci

      # 🔒 Security: Έλεγχος ευπαθειών σε dependencies
      - name: 🔒 Security Audit
        run: npm audit --audit-level=high
        continue-on-error: true  # Μην σταματάει το CI, αλλά δείχνει warnings

      - name: Εκτέλεση Unit Tests
        run: npm test -- --coverage --forceExit

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # 🔒 Security: Ξεχωριστό job για dependency scanning
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout κώδικα
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Εγκατάσταση dependencies
        run: npm ci

      - name: 🔒 npm audit (strict)
        run: npm audit --audit-level=critical

      - name: 🔒 Έλεγχος .env στο repo
        run: |
          if [ -f .env ]; then
            echo "❌ ΣΦΑΛΜΑ: .env βρέθηκε στο repository!"
            exit 1
          fi
          echo "✅ .env δεν βρέθηκε (σωστό)"

      - name: 🔒 Έλεγχος hardcoded secrets
        run: |
          # Αναζήτηση πιθανών hardcoded secrets
          if grep -rn "password.*=.*['\"].*['\"]" --include="*.js" --exclude-dir=node_modules . | grep -v "process.env" | grep -v "test" | grep -v ".example"; then
            echo "⚠️  Πιθανά hardcoded secrets βρέθηκαν!"
          else
            echo "✅ Δεν βρέθηκαν hardcoded secrets"
          fi
