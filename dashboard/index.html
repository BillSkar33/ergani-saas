<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ψηφιακή Κάρτα Εργασίας — Admin Dashboard</title>
  <meta name="description" content="Πίνακας ελέγχου εργοδότη - Ψηφιακή Κάρτα Εργασίας SaaS Platform">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Login Page -->
  <div id="login-page" class="login-page">
    <div class="login-card">
      <div class="login-logo">⏰</div>
      <h1>Κάρτα Εργασίας</h1>
      <p class="login-subtitle">Πίνακας Ελέγχου Εργοδότη</p>
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="info@company.gr" required>
        </div>
        <div class="form-group">
          <label>Κωδικός</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">Σύνδεση</button>
        <div id="login-error" class="error-msg hidden"></div>
      </form>
      <p class="login-register">Νέος εργοδότης; <a href="#" id="show-register">Εγγραφή</a></p>
    </div>
  </div>

  <!-- Register Page -->
  <div id="register-page" class="login-page hidden">
    <div class="login-card">
      <div class="login-logo">🏢</div>
      <h1>Εγγραφή Εργοδότη</h1>
      <form id="register-form">
        <div class="form-group">
          <label>Επωνυμία Εταιρείας</label>
          <input type="text" id="reg-company" placeholder="ACME ΑΕ" required>
        </div>
        <div class="form-group">
          <label>ΑΦΜ Εταιρείας (9 ψηφία)</label>
          <input type="text" id="reg-afm" placeholder="123456789" maxlength="9" pattern="\d{9}" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="info@company.gr" required>
        </div>
        <div class="form-group">
          <label>Κωδικός (min 8 χαρακτήρες)</label>
          <input type="password" id="reg-password" minlength="8" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Εγγραφή</button>
        <div id="register-error" class="error-msg hidden"></div>
      </form>
      <p class="login-register"><a href="#" id="show-login">← Πίσω στη Σύνδεση</a></p>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="app-layout hidden">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-logo">⏰</span>
        <span class="sidebar-title">Κάρτα Εργασίας</span>
      </div>
      <div class="sidebar-company" id="sidebar-company"></div>
      <ul class="nav-links">
        <li><a href="#" data-page="dashboard" class="nav-link active">📊 Dashboard</a></li>
        <li><a href="#" data-page="employees" class="nav-link">👥 Εργαζόμενοι</a></li>
        <li><a href="#" data-page="branches" class="nav-link">🏢 Παραρτήματα</a></li>
        <li><a href="#" data-page="timestamps" class="nav-link">📋 Βάρδιες</a></li>
        <li><a href="#" data-page="fraud" class="nav-link">🚨 Fraud Alerts</a></li>
        <li><a href="#" data-page="settings" class="nav-link">⚙️ Ρυθμίσεις</a></li>
      </ul>
      <div class="sidebar-footer">
        <button class="btn btn-ghost btn-sm" id="logout-btn">🚪 Αποσύνδεση</button>
      </div>
    </nav>

    <!-- Content -->
    <main class="main-content">
      <header class="top-bar">
        <h2 id="page-title">Dashboard</h2>
        <div class="top-bar-actions" id="top-actions"></div>
      </header>
      <div class="content" id="content">
        <!-- Dynamic content loaded here -->
      </div>
    </main>
  </div>

  <!-- Modals -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
