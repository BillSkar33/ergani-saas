<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin — Ψηφιακή Κάρτα Εργασίας</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --surface2: #232340;
            --accent: #e94560;
            --accent2: #0f3460;
            --text: #e0e0ff;
            --text2: #8888aa;
            --success: #2ecc71;
            --warning: #f1c40f;
            --danger: #e74c3c;
            --info: #3498db;
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Login */
        .login-overlay {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg), #16213e);
        }

        .login-box {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: var(--radius);
            width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .5);
        }

        .login-box h2 {
            margin-bottom: 1.5rem;
            color: var(--accent);
            text-align: center;
        }

        .login-box input {
            width: 100%;
            padding: .8rem 1rem;
            margin-bottom: 1rem;
            background: var(--surface2);
            border: 1px solid #333;
            border-radius: 8px;
            color: var(--text);
            font-size: .95rem;
        }

        .login-box button {
            width: 100%;
            padding: .8rem;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .login-box button:hover {
            opacity: .9;
        }

        .login-box .hint {
            text-align: center;
            margin-top: 1rem;
            color: var(--text2);
            font-size: .85rem;
        }

        /* Layout */
        .app {
            display: none;
        }

        .topbar {
            background: var(--surface);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .topbar h1 {
            font-size: 1.2rem;
            color: var(--accent);
        }

        .topbar .user {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .topbar .user span {
            color: var(--text2);
        }

        .btn {
            padding: .5rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: .85rem;
            font-weight: 500;
            transition: .2s;
        }

        .btn-accent {
            background: var(--accent);
            color: #fff;
        }

        .btn-success {
            background: var(--success);
            color: #fff;
        }

        .btn-warning {
            background: var(--warning);
            color: #000;
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        .btn-info {
            background: var(--info);
            color: #fff;
        }

        .btn-sm {
            padding: .35rem .7rem;
            font-size: .8rem;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 0, 0, .3);
        }

        /* Content */
        .content {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Stats row */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: var(--radius);
            border-left: 4px solid var(--accent);
        }

        .stat-card .label {
            color: var(--text2);
            font-size: .85rem;
            margin-bottom: .5rem;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
        }

        .stat-card.trial {
            border-color: var(--warning);
        }

        .stat-card.active {
            border-color: var(--success);
        }

        .stat-card.expired {
            border-color: var(--danger);
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filters input,
        .filters select {
            padding: .5rem .8rem;
            background: var(--surface2);
            border: 1px solid #444;
            border-radius: 8px;
            color: var(--text);
            font-size: .9rem;
        }

        .filters input {
            flex: 1;
            min-width: 200px;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
        }

        th {
            background: var(--surface2);
            padding: .8rem 1rem;
            text-align: left;
            color: var(--text2);
            font-weight: 500;
            font-size: .85rem;
        }

        td {
            padding: .8rem 1rem;
            border-bottom: 1px solid #2a2a40;
            font-size: .9rem;
        }

        tr:hover td {
            background: rgba(233, 69, 96, .05);
        }

        /* Badge */
        .badge {
            display: inline-block;
            padding: .2rem .6rem;
            border-radius: 20px;
            font-size: .75rem;
            font-weight: 600;
        }

        .badge-trial {
            background: rgba(241, 196, 15, .2);
            color: var(--warning);
        }

        .badge-active {
            background: rgba(46, 204, 113, .2);
            color: var(--success);
        }

        .badge-expired {
            background: rgba(231, 76, 60, .2);
            color: var(--danger);
        }

        .badge-suspended {
            background: rgba(136, 136, 170, .2);
            color: var(--text2);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--surface);
            padding: 2rem;
            border-radius: var(--radius);
            width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h3 {
            margin-bottom: 1.5rem;
            color: var(--accent);
        }

        .modal label {
            display: block;
            color: var(--text2);
            font-size: .85rem;
            margin-bottom: .3rem;
            margin-top: .8rem;
        }

        .modal input,
        .modal select,
        .modal textarea {
            width: 100%;
            padding: .6rem .8rem;
            background: var(--surface2);
            border: 1px solid #444;
            border-radius: 8px;
            color: var(--text);
        }

        .modal textarea {
            min-height: 60px;
            resize: vertical;
        }

        .modal .actions {
            display: flex;
            gap: .8rem;
            margin-top: 1.5rem;
            justify-content: flex-end;
        }

        /* Plans grid */
        .plans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }

        .plan-card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: var(--radius);
            border: 1px solid #333;
        }

        .plan-card h4 {
            color: var(--accent);
            margin-bottom: .5rem;
        }

        .plan-card .price {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: .5rem;
        }

        .plan-card .detail {
            color: var(--text2);
            font-size: .85rem;
        }

        /* Alert */
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .alert-info {
            background: rgba(52, 152, 219, .15);
            border: 1px solid var(--info);
        }

        .alert-success {
            background: rgba(46, 204, 113, .15);
            border: 1px solid var(--success);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 2rem;
            border-bottom: 2px solid #333;
        }

        .tab {
            padding: .8rem 1.5rem;
            cursor: pointer;
            color: var(--text2);
            font-weight: 500;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: .2s;
        }

        .tab:hover {
            color: var(--text);
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
    </style>
</head>

<body>

    <!-- Login -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h2>🔑 Super Admin</h2>
            <div id="loginError" style="color:var(--danger);margin-bottom:1rem;display:none;text-align:center;"></div>
            <input id="loginEmail" type="email" placeholder="Email">
            <input id="loginPassword" type="password" placeholder="Κωδικός">
            <button onclick="doLogin()">Σύνδεση</button>
            <div class="hint" id="setupHint" style="display:none;">
                <br>Πρώτη φορά; <a href="#" onclick="showSetup()" style="color:var(--accent);">Δημιουργία Super
                    Admin</a>
            </div>
            <!-- Setup form (hidden) -->
            <div id="setupForm" style="display:none;margin-top:1rem;border-top:1px solid #333;padding-top:1rem;">
                <input id="setupName" placeholder="Ονοματεπώνυμο">
                <input id="setupEmail" type="email" placeholder="Email">
                <input id="setupPassword" type="password" placeholder="Κωδικός (min 8)">
                <button onclick="doSetup()" style="background:var(--success);">✅ Δημιουργία</button>
            </div>
        </div>
    </div>

    <!-- App -->
    <div id="app" class="app">
        <div class="topbar">
            <h1>🔒 Super Admin — Ψηφιακή Κάρτα Εργασίας</h1>
            <div class="user">
                <span id="adminName"></span>
                <button class="btn btn-sm btn-danger" onclick="logout()">Αποσύνδεση</button>
            </div>
        </div>

        <div class="content">
            <!-- Tabs -->
            <div class="tabs">
                <div class="tab active" onclick="showTab('dashboard')">📊 Dashboard</div>
                <div class="tab" onclick="showTab('employers')">🏢 Επιχειρήσεις</div>
                <div class="tab" onclick="showTab('plans')">💳 Πλάνα</div>
            </div>

            <div id="tabContent"></div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal" id="modalBody"></div>
    </div>

    <script>
        const API = '/api/super';
        let TOKEN = localStorage.getItem('super_token');
        let currentTab = 'dashboard';

        // --- API Client ---
        async function api(path, opts = {}) {
            const res = await fetch(API + path, {
                ...opts,
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}`, ...opts.headers },
                body: opts.body ? JSON.stringify(opts.body) : undefined,
            });
            if (res.status === 401) { logout(); return null; }
            return res.json();
        }

        // --- AUTH ---
        async function doLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const res = await fetch(API + '/auth/login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password }),
            });
            const data = await res.json();
            if (data.token) {
                TOKEN = data.token;
                localStorage.setItem('super_token', TOKEN);
                localStorage.setItem('super_name', data.admin.name);
                showApp();
            } else {
                document.getElementById('loginError').textContent = data.error;
                document.getElementById('loginError').style.display = 'block';
            }
        }

        async function doSetup() {
            const res = await fetch(API + '/auth/setup', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('setupName').value,
                    email: document.getElementById('setupEmail').value,
                    password: document.getElementById('setupPassword').value,
                }),
            });
            const data = await res.json();
            if (data.success) { alert('✅ Super Admin δημιουργήθηκε! Κάντε login.'); location.reload(); }
            else alert(data.error);
        }

        function showSetup() { document.getElementById('setupForm').style.display = 'block'; }
        function logout() { localStorage.removeItem('super_token'); localStorage.removeItem('super_name'); location.reload(); }

        function showApp() {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('adminName').textContent = localStorage.getItem('super_name') || 'Admin';
            showTab('dashboard');
        }

        // --- TABS ---
        function showTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[onclick="showTab('${tab}')"]`).classList.add('active');
            if (tab === 'dashboard') loadDashboard();
            else if (tab === 'employers') loadEmployers();
            else if (tab === 'plans') loadPlans();
        }

        // --- DASHBOARD ---
        async function loadDashboard() {
            const data = await api('/stats');
            if (!data) return;
            const e = data.employers;
            document.getElementById('tabContent').innerHTML = `
    <div class="stats">
      <div class="stat-card"><div class="label">Σύνολο Επιχειρήσεων</div><div class="value">${e.total}</div></div>
      <div class="stat-card trial"><div class="label">🧪 Trial</div><div class="value">${e.trial}</div></div>
      <div class="stat-card active"><div class="label">✅ Ενεργοί</div><div class="value">${e.active}</div></div>
      <div class="stat-card expired"><div class="label">⏰ Expired</div><div class="value">${e.expired}</div></div>
      <div class="stat-card"><div class="label">🚫 Suspended</div><div class="value">${e.suspended}</div></div>
      <div class="stat-card"><div class="label">👥 Εργαζόμενοι</div><div class="value">${data.totalEmployees}</div></div>
      <div class="stat-card"><div class="label">📋 Σημερινές Σφραγίδες</div><div class="value">${data.todayTimestamps}</div></div>
      <div class="stat-card"><div class="label">🚨 Fraud Alerts</div><div class="value">${data.unreviewedAlerts}</div></div>
    </div>
    <h3 style="margin-bottom:1rem;">💳 Πλάνα Συνδρομής</h3>
    <div class="plans-grid">
      ${data.plans.map(p => `
        <div class="plan-card">
          <h4>${p.name}</h4>
          <div class="price">${p.price_monthly > 0 ? '€' + p.price_monthly + '/μήνα' : 'Δωρεάν'}</div>
          <div class="detail">👥 Max: ${p.max_employees} εργαζόμενοι</div>
          <div class="detail">🏢 Max: ${p.max_branches} παραρτήματα</div>
          <div class="detail">📅 Trial: ${p.trial_days} ημέρες</div>
        </div>
      `).join('')}
    </div>
  `;
        }

        // --- EMPLOYERS ---
        async function loadEmployers(status = '', search = '') {
            let url = '/employers?page=1';
            if (status) url += `&status=${status}`;
            if (search) url += `&search=${encodeURIComponent(search)}`;
            const data = await api(url);
            if (!data) return;

            document.getElementById('tabContent').innerHTML = `
    <div class="filters">
      <input id="empSearch" value="${search}" placeholder="🔍 Αναζήτηση (επωνυμία, email)..." onkeyup="if(event.key==='Enter')filterEmployers()">
      <select id="empFilter" onchange="filterEmployers()">
        <option value="">Όλοι</option>
        <option value="trial" ${status === 'trial' ? 'selected' : ''}>🧪 Trial</option>
        <option value="active" ${status === 'active' ? 'selected' : ''}>✅ Ενεργοί</option>
        <option value="expired" ${status === 'expired' ? 'selected' : ''}>⏰ Expired</option>
        <option value="suspended" ${status === 'suspended' ? 'selected' : ''}>🚫 Suspended</option>
      </select>
      <span style="color:var(--text2);">Σύνολο: ${data.total}</span>
    </div>
    <table>
      <thead><tr>
        <th>Επιχείρηση</th><th>Email</th><th>ΑΦΜ</th><th>Κατάσταση</th>
        <th>Πλάνο</th><th>👥</th><th>Λήξη Trial</th><th>Ενέργειες</th>
      </tr></thead>
      <tbody>
        ${data.employers.map(e => {
                const badge = e.trial_status === 'trial' ? 'badge-trial' :
                    e.trial_status === 'active' ? 'badge-active' :
                        e.trial_status === 'expired' ? 'badge-expired' : 'badge-suspended';
                const statusLabel = e.trial_status === 'trial' ? '🧪 Trial' :
                    e.trial_status === 'active' ? '✅ Ενεργός' :
                        e.trial_status === 'expired' ? '⏰ Expired' : '🚫 Suspended';
                const expires = e.trial_expires_at ? new Date(e.trial_expires_at).toLocaleDateString('el-GR') : '—';
                return `<tr>
            <td><strong>${e.company_name}</strong></td>
            <td>${e.email}</td>
            <td>${e.afm_ergodoti}</td>
            <td><span class="badge ${badge}">${statusLabel}</span></td>
            <td>${e.subscription_plan || 'trial'}</td>
            <td>${e.employee_count || 0}/${e.max_employees || 5}</td>
            <td>${expires}</td>
            <td>
              <button class="btn btn-sm btn-success" onclick="trialAction('${e.id}','extend')">+14 ημ</button>
              <button class="btn btn-sm btn-info" onclick="trialAction('${e.id}','activate')">✅</button>
              <button class="btn btn-sm btn-warning" onclick="trialAction('${e.id}','suspend')">🚫</button>
              <button class="btn btn-sm btn-accent" onclick="openManage('${e.id}')">⚙️</button>
            </td>
          </tr>`;
            }).join('')}
      </tbody>
    </table>
  `;
        }

        function filterEmployers() {
            const s = document.getElementById('empSearch')?.value || '';
            const f = document.getElementById('empFilter')?.value || '';
            loadEmployers(f, s);
        }

        async function trialAction(id, action) {
            const body = { action };
            if (action === 'extend') body.days = 14;
            await api(`/employers/${id}/trial`, { method: 'PUT', body });
            loadEmployers();
        }

        function openManage(id) {
            document.getElementById('modal').classList.add('show');
            document.getElementById('modalBody').innerHTML = `
    <h3>⚙️ Διαχείριση Employer</h3>
    <label>Πλάνο</label>
    <select id="mPlan">
      <option value="trial">Δοκιμαστικό</option>
      <option value="basic">Βασικό</option>
      <option value="pro">Επαγγελματικό</option>
      <option value="enterprise">Εταιρικό</option>
    </select>
    <label>Max Εργαζόμενοι</label>
    <input id="mMaxEmp" type="number" value="5">
    <label>Max Παραρτήματα</label>
    <input id="mMaxBranch" type="number" value="1">
    <label>Παράταση Trial (ημέρες)</label>
    <input id="mDays" type="number" value="14">
    <label>Σημειώσεις</label>
    <textarea id="mNotes"></textarea>
    <div class="actions">
      <button class="btn btn-sm" onclick="closeModal()">Κλείσιμο</button>
      <button class="btn btn-sm btn-success" onclick="saveManage('${id}','extend')">📅 Παράταση</button>
      <button class="btn btn-sm btn-info" onclick="saveManage('${id}','activate')">✅ Ενεργοποίηση</button>
      <button class="btn btn-sm btn-danger" onclick="saveManage('${id}','expire')">⏰ Λήξη</button>
    </div>
  `;
        }

        async function saveManage(id, action) {
            const body = {
                action,
                plan: document.getElementById('mPlan').value,
                maxEmployees: parseInt(document.getElementById('mMaxEmp').value),
                maxBranches: parseInt(document.getElementById('mMaxBranch').value),
                days: parseInt(document.getElementById('mDays').value),
                notes: document.getElementById('mNotes').value,
            };
            await api(`/employers/${id}/trial`, { method: 'PUT', body });
            closeModal();
            loadEmployers();
        }

        function closeModal() { document.getElementById('modal').classList.remove('show'); }

        // --- PLANS ---
        async function loadPlans() {
            const data = await api('/plans');
            if (!data) return;
            document.getElementById('tabContent').innerHTML = `
    <div class="alert alert-info">ℹ️ Αυτά τα πλάνα ορίζουν τα όρια για κάθε κατηγορία εργοδότη.</div>
    <div class="plans-grid">
      ${data.plans.map(p => `
        <div class="plan-card">
          <h4>${p.name}</h4>
          <div class="price">${p.price_monthly > 0 ? '€' + p.price_monthly + '/μήνα' : 'Δωρεάν'}</div>
          <div class="detail">👥 Max εργαζόμενοι: <strong>${p.max_employees}</strong></div>
          <div class="detail">🏢 Max παραρτήματα: <strong>${p.max_branches}</strong></div>
          <div class="detail">📅 Trial ημέρες: <strong>${p.trial_days}</strong></div>
          <div class="detail" style="margin-top:.5rem;">ID: <code>${p.id}</code></div>
        </div>
      `).join('')}
    </div>
  `;
        }

        // --- INIT ---
        if (TOKEN) { showApp(); } else {
            document.getElementById('setupHint').style.display = 'block';
        }
    </script>
</body>

</html>
