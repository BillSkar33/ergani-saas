# ============================================================
# Docker Compose — Υποδομή για Ψηφιακή Κάρτα Εργασίας SaaS
# 🔒 Security-Hardened: Redis password, restricted ports, healthchecks
# ============================================================

services:
  # --- PostgreSQL 16: Κύρια βάση δεδομένων ---
  postgres:
    image: postgres:16-alpine
    container_name: ergani-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432" # 🔒 Μόνο localhost (ΟΧΙ 0.0.0.0)
    environment:
      POSTGRES_DB: ergani_db
      POSTGRES_USER: ergani_user
      POSTGRES_PASSWORD: ergani_secure_pass_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ergani_user -d ergani_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    # 🔒 Περιορισμός resources
    deploy:
      resources:
        limits:
          memory: 512M

  # --- Redis 7: Cache, Sessions, JWT Token Cache ---
  redis:
    image: redis:7-alpine
    container_name: ergani-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379" # 🔒 Μόνο localhost
    # 🔒 Redis password + max memory policy
    command: >
      redis-server --requirepass ergani_redis_pass_2026 --maxmemory 128mb --maxmemory-policy allkeys-lru --rename-command FLUSHALL "" --rename-command FLUSHDB "" --rename-command DEBUG ""
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "ergani_redis_pass_2026", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # --- Zookeeper: Απαιτείται από το Kafka ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ergani-zookeeper
    restart: unless-stopped
    ports:
      - "127.0.0.1:2181:2181" # 🔒 Μόνο localhost
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # --- Apache Kafka: Message Broker ---
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ergani-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "127.0.0.1:9092:9092" # 🔒 Μόνο localhost
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 30s
      timeout: 10s
      retries: 5

# --- Named Volumes ---
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
