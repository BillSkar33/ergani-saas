# ============================================================
# 🔒 Nginx Reverse Proxy — Production Configuration
# Ψηφιακή Κάρτα Εργασίας SaaS Platform
#
# HTTPS / TLS (Let's Encrypt), Rate Limiting, Security Headers
# Χρήση: Αντιγραφή στο /etc/nginx/sites-available/ergani
#        sudo ln -s /etc/nginx/sites-available/ergani /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# 🔒 Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=webhooks:10m rate=100r/s;

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name api.yourdomain.gr;
    return 301 https://$server_name$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name api.yourdomain.gr;

    # ============================================================
    # 🔒 TLS Configuration (Let's Encrypt)
    # Εγκατάσταση: sudo certbot --nginx -d api.yourdomain.gr
    # ============================================================
    ssl_certificate /etc/letsencrypt/live/api.yourdomain.gr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.gr/privkey.pem;
    
    # Μόνο TLS 1.2+ (αποτροπή POODLE, BEAST)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ============================================================
    # 🔒 Security Headers
    # ============================================================
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # ============================================================
    # LOCATIONS
    # ============================================================

    # Webhooks — υψηλό rate limit (platforms κάνουν retries)
    location /webhooks/ {
        limit_req zone=webhooks burst=50 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Auth endpoints — χαμηλό rate limit (αποτροπή brute-force)
    location /api/admin/auth/ {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin API — μεσαίο rate limit
    location /api/admin/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Dashboard static files
    location /admin/ {
        limit_req zone=general burst=30;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Cache static assets
        location ~* \.(css|js|png|jpg|ico|woff2)$ {
            proxy_pass http://127.0.0.1:3000;
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }
    }

    # Health check (no rate limit)
    location /health {
        proxy_pass http://127.0.0.1:3000;
    }

    # Block everything else
    location / {
        return 404;
    }

    # 🔒 Απόκρυψη nginx version
    server_tokens off;

    # Logs
    access_log /var/log/nginx/ergani_access.log;
    error_log /var/log/nginx/ergani_error.log;
}
